              iMessage...
            </div>
            <button className="bg-white/10 text-white p-2.5 rounded-full border border-white/10 hover:bg-white/20 transition-colors">
              <Send size={18} className="ml-0.5" strokeWidth={1.5} />
            </button>
          </div>
        </div>
      );
    };

    // ===== 잠금 다이얼 퍼즐 설정 =====
    const CORRECT_NUMBER = '081234567'; // 제대증명서 SERVICE NO: 08-1234567

    const dialPad = [
      ['1', ''], ['2', 'ABC'], ['3', 'DEF'],
      ['4', 'GHI'], ['5', 'JKL'], ['6', 'MNO'],
      ['7', 'PQRS'], ['8', 'TUV'], ['9', 'WXYZ'],
      ['*', ''], ['0', '+'], ['#', '']
    ];

    const formatNumber = (raw) => (/^\d{3,}$/.test(raw) ? raw.slice(0, 2) + '-' + raw.slice(2) : raw);

    const DialerScreen = ({ value, onChange, onCall, showHint }) => {
      const pressKey = (k) => {
        onChange((v) => (v.length >= 15 ? v : v + k));
        if (navigator.vibrate) navigator.vibrate(10);
      };

      return (
        <div className="h-full flex flex-col bg-[#050505] text-white pt-[70px] pb-[45px]">
          {/* 입력된 번호 표시 */}
          <div className="h-20 flex items-center justify-center px-8">
            {value ? (
              <span className="text-[32px] font-light tracking-[0.06em] text-gray-100 truncate">{formatNumber(value)}</span>
            ) : (
              <span className="text-gray-600 text-[13px] tracking-[0.3em] font-light uppercase">Enter Number</span>
            )}
          </div>

          {/* 오답 후 힌트 */}
          <div className="h-6 flex items-center justify-center">
            {showHint && (
              <span className="font-mono text-red-400/90 text-[11px] tracking-[0.35em] uppercase animate-pulse drop-shadow-[0_0_8px_rgba(248,113,113,0.5)]">
                ▲ Service No. Check
              </span>
            )}
          </div>

          {/* 키패드 */}
          <div className="grid grid-cols-3 gap-x-5 gap-y-3.5 px-9 mt-auto">
            {dialPad.map(([d, letters]) => (
              <button
                key={d}
                onClick={() => pressKey(d)}
                className="w-[72px] h-[72px] mx-auto rounded-full bg-white/[0.07] active:bg-white/25 transition-colors duration-100 flex flex-col items-center justify-center select-none"
              >
                <span className="text-[29px] font-light leading-none">{d}</span>
                {letters && <span className="text-[9px] tracking-[0.18em] text-gray-500 mt-1">{letters}</span>}
              </button>
            ))}
          </div>

          {/* 통화 / 지우기 */}
          <div className="grid grid-cols-3 px-9 mt-3.5 items-center">
            <div></div>
            <button
              onClick={() => value && onCall()}
              className="w-[72px] h-[72px] mx-auto rounded-full bg-green-500 active:bg-green-400 flex items-center justify-center shadow-[0_0_25px_rgba(34,197,94,0.3)]"
            >
              <Phone size={30} strokeWidth={1.8} fill="currentColor" className="text-white" />
            </button>
            {value ? (
              <button
                onClick={() => onChange((v) => v.slice(0, -1))}
                className="w-[72px] h-[72px] mx-auto flex items-center justify-center text-gray-400 active:text-white transition-colors"
              >
                <Delete size={26} strokeWidth={1.5} />
              </button>
            ) : (
              <div></div>
            )}
          </div>
        </div>
      );
    };

    const CallScreen = ({ number, success, onResult }) => {
      const [phase, setPhase] = useState('dialing');

      useEffect(() => {
        const t1 = setTimeout(() => setPhase('result'), 2400);
        const t2 = setTimeout(() => onResult(success), success ? 4800 : 4600);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      return (
        <div className="h-full flex flex-col items-center bg-[#050505] text-white pt-[110px] relative">
          <div className={`w-24 h-24 rounded-full flex items-center justify-center border bg-white/[0.04] transition-all duration-700 ${phase === 'result' && success ? 'border-green-500/60 shadow-[0_0_30px_rgba(34,197,94,0.3)]' : 'border-white/10'}`}>
            <User size={40} className="opacity-70" />
          </div>
          <p className="mt-6 text-2xl font-light tracking-wider">{formatNumber(number)}</p>

          {phase === 'dialing' && (
            <p className="mt-4 text-sm text-gray-400 font-light animate-pulse tracking-widest">연결 중...</p>
          )}
          {phase === 'result' && success && (
            <div className="mt-8 text-center animate-fade-in" style={{ animationFillMode: 'forwards' }}>
              <p className="font-mono text-green-400 text-[13px] tracking-[0.3em]">ACCESS GRANTED</p>
              <p className="mt-3 text-gray-300 text-sm font-light">신원 확인 완료. 보안 채널을 엽니다.</p>
            </div>
          )}
          {phase === 'result' && !success && (
            <div className="mt-8 text-center animate-fade-in px-10" style={{ animationFillMode: 'forwards' }}>
              <p className="text-gray-300 text-sm font-light leading-relaxed">지금 거신 전화는 없는 번호입니다.<br />다시 확인하시고 걸어 주시기 바랍니다.</p>
            </div>
          )}

          {/* 통화 종료 버튼 (연출용) */}
          <div className="absolute bottom-[70px]">
            <div className="w-[72px] h-[72px] rounded-full bg-red-500 flex items-center justify-center opacity-90">
              <Phone size={30} className="rotate-[135deg] text-white" strokeWidth={1.8} fill="currentColor" />
            </div>
          </div>
        </div>
      );
    };

    const PhoneMockup = () => {
      const [screen, setScreen] = useState('dialer'); // dialer | call | messenger
      const [dialed, setDialed] = useState('');
      const [hasFailed, setHasFailed] = useState(false);
      const [activeChat, setActiveChat] = useState(null);

      return (
        <div className="relative w-full max-w-[380px] h-[812px] max-h-[95vh] sm:rounded-[3rem] sm:border-[10px] sm:border-[#1a1a1a] sm:shadow-[0_0_60px_rgba(0,0,0,0.8),inset_0_0_10px_rgba(255,255,255,0.1)] overflow-hidden bg-black flex flex-col mx-auto ring-1 ring-white/10">

          {/* 상태바 */}
          <div className="absolute top-0 w-full h-[50px] flex justify-end items-center px-7 z-50 text-white text-[12px] font-medium pointer-events-none">
            <div className="flex items-center gap-2 opacity-80">
              <Signal size={14} className="fill-current" strokeWidth={2} />
              <Wifi size={14} strokeWidth={2} />
              <Battery size={16} strokeWidth={2} />
            </div>
          </div>

          {/* 다이나믹 아일랜드 (노치) */}
          <div className="hidden sm:block absolute top-2 left-1/2 -translate-x-1/2 w-[110px] h-[32px] bg-black rounded-full z-50 shadow-[inset_0_0_4px_rgba(255,255,255,0.1)] border border-white/5"></div>

          {/* 화면 렌더링 */}
          <div className="w-full h-full bg-[#050505] flex flex-col relative z-0">
            {screen === 'dialer' && (
              <DialerScreen value={dialed} onChange={setDialed} onCall={() => setScreen('call')} showHint={hasFailed} />
            )}
            {screen === 'call' && (
              <CallScreen
                number={dialed}
                success={dialed.replace(/\D/g, '') === CORRECT_NUMBER}
                onResult={(ok) => {
                  if (ok) {
                    setScreen('messenger');
                  } else {
                    setHasFailed(true);
                    setDialed('');
                    setScreen('dialer');
                  }
                }}
              />
            )}
            {screen === 'messenger' && (
              activeChat ? (
                <ChatRoom chat={activeChat} onBack={() => setActiveChat(null)} />
              ) : (
                <ChatList chats={chatData} onSelectChat={setActiveChat} />
              )
            )}
          </div>

          {/* 하단 홈바 */}
          <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-[35%] h-[4px] bg-white/30 rounded-full z-50 pointer-events-none"></div>
        </div>
      );
    };

    function App() {
      return (
        <>
          <style>
            {`
              @keyframes slideUp {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
              }
              @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
              }
              .animate-slide-up {
                animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
              }
              .animate-fade-in {
                animation: fadeIn 0.8s ease;
              }
              .hide-scrollbar::-webkit-scrollbar {
                display: none;
              }
              .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
              }
            `}
          </style>
          <div className="min-h-screen bg-[#0a0a0a] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-900 via-black to-black font-sans flex items-center justify-center p-0 sm:p-4 selection:bg-white/20 text-gray-100">
            <PhoneMockup />
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
